# Baut das Docker-Image und veröffentlicht es in der GitHub Container Registry
# (ghcr.io). Läuft bei jedem Push auf main sowie bei Versions-Tags (v1.2.3).
#
# Einmalig nach dem ersten Lauf: GitHub -> Profil -> Packages -> ubuchhaltung
# -> Package settings -> "Change visibility" auf Public stellen, damit
# Unraid/Proxmox das Image ohne Anmeldung ziehen können.
name: Docker-Image veröffentlichen (GHCR)

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Buildx einrichten
        uses: docker/setup-buildx-action@v3

      - name: Bei GHCR anmelden
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tags und Labels ableiten
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/nobsevomberg/ubuchhaltung
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Bauen und pushen
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
